<!DOCTYPE html>
<html lang="es">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script>

    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-GYMMJC4E8M');

  <!-- End Google tag -->

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
    }
    .card { text-align: center; padding: 48px 32px; max-width: 360px; width: 90%; }
    .icon {
      width: 72px; height: 72px; background: #25D366; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px; animation: pulse 1.6s ease-in-out infinite;
    }
    .icon svg { width: 38px; height: 38px; fill: #fff; }
    h1 { font-size: 1.4rem; font-weight: 600; color: #fff; margin-bottom: 8px; letter-spacing: -0.02em; }
    p { font-size: 0.95rem; color: #888; line-height: 1.5; }
    .dots { margin-top: 28px; display: flex; justify-content: center; gap: 8px; }
    .dot { width: 8px; height: 8px; background: #25D366; border-radius: 50%; opacity: 0.3; animation: blink 1.2s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(37,211,102,0.4); }
      50%       { box-shadow: 0 0 0 16px rgba(37,211,102,0); }
    }
    @keyframes blink {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
    </div>
    <h1>Conectando con un asesor</h1>
    <p id="status-text">En un momento te redirigimos a WhatsApp</p>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <script>
    // Fallback de emergencia si la función del servidor falla por completo
    const FALLBACK_URL = 'https://chat.whatsapp.com/J0ByT3OtyFCKVWCuBOQ1qU';

    async function redirigir() {
      try {
        const res = await fetch('/.netlify/functions/siguiente', { cache: 'no-store' });
        if (!res.ok) throw new Error('Function error');
        const data = await res.json();

        // Evento a Google Analytics con el nombre del asesor asignado
        if (typeof gtag === 'function') {
          gtag('event', 'whatsapp_redirect', { asesor: data.nombre });
        }

        window.location.href = data.url;
      } catch (err) {
        // Si falla la función, redirige a un asesor fijo para no perder al cliente
        if (typeof gtag === 'function') {
          gtag('event', 'whatsapp_redirect_fallback');
        }
        window.location.href = FALLBACK_URL;
      }
    }

    // Pequeña espera para que se vea la animación, luego redirige
    setTimeout(redirigir, 900);
  </script>

</body>
</html>
