  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
    }
    .card { text-align: center; padding: 48px 32px; max-width: 360px; width: 90%; }
    .icon {
      width: 72px; height: 72px; background: #25D366; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
    }
    .icon svg { width: 38px; height: 38px; fill: #fff; }
    h1 { font-size: 1.4rem; font-weight: 600; color: #fff; margin-bottom: 8px; letter-spacing: -0.02em; }
    p { font-size: 0.95rem; color: #888; line-height: 1.5; margin-bottom: 28px; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #25D366;
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
      padding: 16px 28px;
      border-radius: 14px;
      text-decoration: none;
      width: 100%;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.4s ease, transform 0.4s ease, background 0.15s ease;
      letter-spacing: 0.03em;
    }
    .btn.visible { opacity: 1; transform: translateY(0); }
    .btn:active { background: #1ebe5a; }
    .btn svg { width: 22px; height: 22px; fill: #fff; }
    .loading-text { display: block; }
    .loading-text.hidden { display: none; }
    .dots { margin-top: 20px; display: flex; justify-content: center; gap: 8px; }
    .dots.hidden { display: none; }
    .dot { width: 8px; height: 8px; background: #25D366; border-radius: 50%; opacity: 0.3; animation: blink 1.2s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 1; }
    }
  </style>

    </a>
  </div>

  <script>
    const FALLBACK_URL = 'https://chat.whatsapp.com/CXJ5VNp2nAj2qp8GpgqyKm';
    const btn = document.getElementById('btn-whatsapp');
    const statusText = document.getElementById('status-text');
    const dots = document.getElementById('dots');

    async function prepararLink() {
      let url = FALLBACK_URL;
      let nombre = null;
      try {
        const res = await fetch('/.netlify/functions/siguiente', { cache: 'no-store' });
        if (!res.ok) throw new Error('Function error');
        const data = await res.json();
        url = data.url;
        nombre = data.nombre;
      } catch (err) {}

      btn.href = url;
      btn.classList.add('visible');
      statusText.classList.add('hidden');
      dots.classList.add('hidden');

      btn.addEventListener('click', function () {
        if (typeof gtag === 'function') {
          gtag('event', 'whatsapp_redirect', { asesor: nombre || 'fallback' });
        }
      });
    }

    prepararLink();
  </script>
</body>
</html>
