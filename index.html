  <script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      overflow: hidden;
    }
    .container {
      text-align: center;
      padding: 32px 24px;
      max-width: 400px;
      width: 95%;
    }
    .logo {
      font-size: 1rem;
      font-weight: 700;
      color: #25D366;
      letter-spacing: 0.15em;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    h1 {
      font-size: 1.1rem;
      font-weight: 400;
      color: #aaa;
      margin-bottom: 28px;
    }
    .slot {
      width: 200px;
      height: 200px;
      margin: 0 auto 24px;
      position: relative;
    }
    .slot-ring {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: 3px solid #25D366;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 20px rgba(37,211,102,0.3);
    }
    .slot-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top;
      position: absolute;
      top: 0; left: 0;
      opacity: 0;
      transition: opacity 0.1s;
    }
    .slot-img.active { opacity: 1; }
    .slot-ring.stopping {
      border-color: #FFD700;
      box-shadow: 0 0 30px rgba(255,215,0,0.5);
    }
    .slot-ring.stopped {
      border-color: #25D366;
      box-shadow: 0 0 40px rgba(37,211,102,0.6);
      animation: glow 1.5s ease-in-out infinite;
    }
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 20px rgba(37,211,102,0.4); }
      50% { box-shadow: 0 0 50px rgba(37,211,102,0.8); }
    }
    .name-tag {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
      min-height: 2rem;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .name-tag.visible { opacity: 1; transform: translateY(0); }
    .role-tag {
      font-size: 0.85rem;
      color: #25D366;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 24px;
      min-height: 1.2rem;
      opacity: 0;
      transition: opacity 0.5s ease 0.2s;
    }
    .role-tag.visible { opacity: 1; }
    .spinning-text {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 0;
      min-height: 1.5rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #25D366;
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
      padding: 16px 28px;
      border-radius: 14px;
      text-decoration: none;
      width: 100%;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.5s ease 0.4s, transform 0.5s ease 0.4s, background 0.15s ease;
      letter-spacing: 0.03em;
      pointer-events: none;
    }
    .btn.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .btn:active { background: #1ebe5a; }
    .btn svg { width: 22px; height: 22px; fill: #fff; flex-shrink: 0; }
  </style>
</head>

    const imgs = [document.getElementById('img0'), document.getElementById('img1'), document.getElementById('img2'), document.getElementById('img3')];

    let current = 0;
    let destUrl = FALLBACK_URL;
    let destNombre = null;

    function showImg(idx) {
      imgs.forEach((img, i) => img.classList.toggle('active', i === idx));
      current = idx;

    function onStop() {
      ring.classList.remove('stopping');
      ring.classList.add('stopped');
      spinText.textContent = '';
      nameTag.textContent = destNombre || 'Tu asesor';
      nameTag.classList.add('visible');
